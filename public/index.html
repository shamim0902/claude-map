<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Map</title>
  <link rel="icon" href="/logo.png" type="image/png">
  <link rel="stylesheet" href="/style.css">
  <link id="hljs-dark"  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" disabled>
</head>
<body>
  <div class="app-shell">

    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-brand" onclick="selectGlobal()" style="cursor:pointer" title="Go to Global Dashboard">
        <img src="/logo.png" alt="Claude Map" class="brand-logo">
        <div class="brand-actions">
          <button class="btn-theme-toggle" id="theme-toggle"
                  onclick="event.stopPropagation();toggleTheme()" title="Switch to light mode">◑</button>
        </div>
      </div>

      <div class="sidebar-section projects-panel">
        <div class="sidebar-label-row">
          <label class="sidebar-label">Projects</label>
          <button class="btn-add-project" onclick="openAddProjectBrowser()" title="Browse for project">+</button>
        </div>
        <div class="sidebar-path-input-row">
          <input id="paste-path-input" class="paste-path-input" type="text"
                 placeholder="Paste project path…"
                 onkeydown="if(event.key==='Enter')addPastedPath()">
          <button class="btn-paste-add" onclick="addPastedPath()" title="Add path">→</button>
        </div>
        <div id="projects-list" class="sidebar-projects">
          <span class="sidebar-hint">Loading…</span>
        </div>
      </div>

      <div class="sidebar-footer">
        <div id="sse-indicator" class="sse-indicator">
          <span class="sse-dot"></span>
          <span class="sse-label">Connecting…</span>
        </div>
        <div class="footer-actions">
          <button class="btn-ghost" onclick="doExport()" title="Export JSON">↓</button>
          <button class="btn-ghost" onclick="doRefresh()" title="Refresh scan">↺</button>
          <span id="scan-meta" class="scan-meta"></span>
        </div>
      </div>
    </aside>

    <!-- ── Mobile sidebar backdrop ─────────────────────────── -->
    <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="closeMobileSidebar()"></div>

    <!-- ── Main area ────────────────────────────────────────── -->
    <main class="main-area" id="main-area">
      <div class="mobile-header">
        <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>
        <img src="/logo.png" alt="Claude Map" class="brand-logo" onclick="selectGlobal()" style="cursor:pointer">
        <div style="margin-left:auto">
          <button class="btn-theme-toggle" onclick="toggleTheme()" title="Toggle theme">◑</button>
        </div>
      </div>
      <nav id="tab-bar" class="tab-bar"></nav>

      <!-- Positioning context for tray + panel -->
      <div class="content-with-terminal" id="content-with-terminal">
        <div id="tab-content" class="tab-content"></div>

        <!-- Terminal panel — absolutely positioned above the tray -->
        <div id="terminal-panel" class="terminal-panel hidden">
          <div class="terminal-resize-handle" id="terminal-resize-handle"></div>
          <div class="terminal-panel-header">
            <span id="terminal-cwd" class="terminal-cwd"></span>
            <div style="margin-left:auto;display:flex;gap:4px;align-items:center">
              <button class="btn-ghost" onclick="minimizeTerminal()" title="Minimize" style="padding:2px 6px;font-size:13px">−</button>
              <button class="btn-ghost" onclick="closeActiveTerminalTab()" title="Close tab" style="padding:2px 6px;font-size:13px">✕</button>
            </div>
          </div>
          <div id="terminal-container" class="terminal-container"></div>
        </div>

        <!-- Tray strip — absolutely pinned to bottom of content area -->
        <div id="terminal-tray" class="terminal-tray">
          <div id="terminal-tray-tabs" class="terminal-tray-tabs"></div>
          <button class="terminal-tray-add" onclick="trayNewTerminal()" title="New terminal (Ctrl+`)">+</button>
        </div>
      </div>
    </main>

  </div>

  <!-- ── Directory Browser Modal ──────────────────────────── -->
  <div id="dir-browser-overlay" class="modal-overlay hidden" onclick="closeBrowser()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">Select Project Folder</span>
        <button class="modal-close" onclick="closeBrowser()">✕</button>
      </div>
      <div class="modal-body">
        <div id="browser-bookmarks" class="browser-bookmarks"></div>
        <div id="browser-crumbs"    class="browser-crumbs"></div>
        <div id="browser-error"     class="browser-error hidden"></div>
        <div id="browser-list"      class="browser-list">
          <div class="loading-state" style="min-height:120px"><div class="spinner"></div></div>
        </div>
      </div>
      <div class="modal-footer">
        <div id="browser-current-path" class="browser-selected-path"></div>
        <div class="modal-actions">
          <label class="browser-hidden-toggle">
            <input type="checkbox" id="browser-show-hidden" onchange="browserToggleHidden()">
            show hidden
          </label>
          <button class="btn-secondary" onclick="closeBrowser()">Cancel</button>
          <button class="btn-primary"   onclick="confirmBrowser()">Select This Folder</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Import Modal ─────────────────────────────────────── -->
  <div id="import-overlay" class="modal-overlay hidden" onclick="closeImportModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="import-modal-title">Import Skills & Commands</span>
        <button class="modal-close" onclick="closeImportModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="import-drop-zone" class="import-drop-zone"
             ondragover="event.preventDefault();this.classList.add('dragover')"
             ondragleave="this.classList.remove('dragover')"
             ondrop="handleImportDrop(event)">
          Drop .md or .json file here
        </div>
        <textarea id="import-textarea" class="import-textarea"
                  placeholder="Or paste skill/command markdown or bundle JSON here…"
                  oninput="previewImport()"></textarea>
        <div id="import-preview" class="import-preview hidden"></div>
      </div>
      <div class="modal-footer">
        <div class="modal-actions">
          <select id="import-scope" class="import-scope-select">
            <option value="global">Global (~/.claude/)</option>
            <option value="project">Project (.claude/)</option>
          </select>
          <button class="btn-secondary" onclick="closeImportModal()">Cancel</button>
          <button class="btn-primary" id="import-confirm-btn" onclick="confirmImport()" disabled>Import</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Share Modal ───────────────────────────────────────── -->
  <div id="share-overlay" class="modal-overlay hidden" onclick="closeShareModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">Share to Project</span>
        <button class="modal-close" onclick="closeShareModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="share-modal-section-label">Selected items</div>
        <div id="share-item-preview" class="share-item-preview"></div>
        <div class="share-modal-section-label" style="margin-top:14px">Copy to project</div>
        <select id="share-target-select" class="import-scope-select" style="width:100%;margin-top:4px" onchange="onShareTargetChange()">
          <option value="">— pick a project —</option>
        </select>
        <div id="share-result" style="margin-top:10px;font-size:12px;min-height:18px"></div>
      </div>
      <div class="modal-footer">
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeShareModal()">Cancel</button>
          <button class="btn-primary" id="share-confirm-btn" onclick="confirmShare()" disabled>Copy to Project</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Bundle Export Modal ─────────────────────────────── -->
  <div id="bundle-overlay" class="modal-overlay hidden" onclick="closeBundleModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">Export Bundle</span>
        <button class="modal-close" onclick="closeBundleModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
          Select items to include in the export bundle. Share this file with your team.
        </p>
        <label class="bundle-check"><input type="checkbox" id="bundle-skills" checked> Skills</label>
        <label class="bundle-check"><input type="checkbox" id="bundle-commands" checked> Commands</label>
        <label class="bundle-check"><input type="checkbox" id="bundle-claudemd"> CLAUDE.md</label>
        <div style="margin-top:12px">
          <label style="font-size:12px;color:var(--text-muted)">Scope</label>
          <select id="bundle-scope" class="import-scope-select" style="margin-top:4px">
            <option value="global">Global</option>
            <option value="project">Current Project</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeBundleModal()">Cancel</button>
          <button class="btn-primary" onclick="confirmBundleExport()">Download Bundle</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Scripts ──────────────────────────────────────────── -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.9.0/lib/addon-web-links.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/php.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/markdown.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
